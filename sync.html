                color: T.text, 
                lineHeight: 1.6, 
                boxShadow: isUser ? 'none' : '0 1px 2px rgba(0,0,0,0.02)',
                maxWidth: '95%'
              }}>
                {m.content}
              </div>
            </div>
          );
        })}
        {loading && (
          <div style={{ fontSize: 12, color: T.textFaint, fontStyle: 'italic' }}>Escribiendo...</div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Input Area */}
      <div style={{ padding: '0 24px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        
        {/* Sugerencias */}
        {messages.length <= 2 && !loading && (
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {SUGGESTIONS.map((s, i) => (
              <button key={i} onClick={() => send(s)}
                style={{ background: '#FFFFFF', border: `1px solid ${T.green}40`, color: T.green, borderRadius: 20, padding: '6px 12px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                {s}
              </button>
            ))}
          </div>
        )}

        <div style={{ fontSize: 11, color: T.textFaint, textAlign: 'center', lineHeight: 1.5, padding: '0 10px' }}>
          Ingresa los antecedentes técnicos de tu proyecto de inversión para avanzar.<br/><br/>Si tienes alguna duda acerca de la información requerida, siempre puedes pedirme ayuda.
        </div>

        {/* Input Box */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, border: `1px solid ${T.borderDark}`, borderRadius: 24, padding: '10px 16px', background: '#FFFFFF' }}>
          <input 
            value={input} 
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if(e.key === "Enter") { e.preventDefault(); send(); } }}
            placeholder="Enviar mensaje" 
            disabled={loading}
            style={{ flex: 1, border: 'none', background: 'transparent', fontSize: 13, color: T.text }} 
          />
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex' }}><Icons.Mic /></button>
          <button onClick={() => send()} disabled={loading || !input.trim()} style={{ background: 'none', border: 'none', cursor: (loading || !input.trim()) ? 'default' : 'pointer', display: 'flex' }}><Icons.Send /></button>
        </div>
      </div>

    </div>
  );
}


// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [messages,setMessages]=useState([
    {role:"assistant",content:`Hola. Soy TitanIA, el asistente de análisis regulatorio del **Proyecto Inmobiliario**.\n\nHe procesado la Matriz de Compromisos Ambientales (MCA). De los 47 compromisos, detecto **8 brechas** entre los compromisos evaluados y los recogidos en la RCA. ¿En qué te puedo ayudar hoy?`}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);

  const send = async(text)=>{
    const msg=text||input.trim();
    if(!msg||loading) return;
    setInput("");
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs);
    setLoading(true);
    
    // Simulación rápida de respuesta si no hay API Key configurada
    if (!CONFIG.API_KEY && !CONFIG.PROXY_URL) {
      setTimeout(() => {
        setMessages(prev=>[...prev,{role:"assistant",content:"¡Hola! Por ahora la conexión está en pausa porque estamos trabajando en el diseño visual de la plataforma, ¡pero te escucho fuerte y claro!"}]);
        setLoading(false);
      }, 1000);
      return;
    }

    try {
      let res;
      if(CONFIG.PROXY_URL) {
        res = await fetch(CONFIG.PROXY_URL,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({system:SYSTEM_PROMPT,messages:newMsgs.map(m=>({role:m.role,content:m.content}))})
        });
      } else {
        res = await fetch("https://corsproxy.io/?https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-api-key":CONFIG.API_KEY,
            "anthropic-version":"2023-06-01",
            "anthropic-dangerously-allow-browser": "true"
          },
          body:JSON.stringify({model:"claude-3-5-sonnet-20241022",max_tokens:1000,system:SYSTEM_PROMPT,messages:newMsgs.map(m=>({role:m.role,content:m.content}))})
        });
      }
      if (!res.ok) throw new Error(await res.text());
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Error al obtener respuesta.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:"🕵️ ERROR: " + e.message}]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100vw', background: T.bg }}>
      <Sidebar />
      <MainPanel />
      <ChatPanel messages={messages} input={input} setInput={setInput} send={send} loading={loading} bottomRef={bottomRef} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
